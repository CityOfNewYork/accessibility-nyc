<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NYC Accessibility Scan</title>

<body>
  <header class="container">
    <hgroup>
      <h1>NYC Accessibility Scan</h1>
